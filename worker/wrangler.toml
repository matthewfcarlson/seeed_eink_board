name = "eink-worker"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Image ingestion (decode/resize/dither) runs in-Worker on /admin/images/upload and is
# CPU-heavy (hand-rolled Floyd-Steinberg/Atkinson dithering over ~1.9M pixels). The
# default free-tier CPU limit (10ms) is nowhere near enough — this requires a paid
# Workers plan where higher `cpu_ms` limits are honored.
[limits]
cpu_ms = 30000

[vars]
# Non-secret config. Secrets (none yet) go via `wrangler secret put`.
ENVIRONMENT = "development"

# Real Cloudflare resources (created via dashboard). This is the single deploy
# environment — Cloudflare's Git-connected Workers Build runs plain `npx wrangler
# deploy` with no --env flag, so it always deploys this top-level config to the
# "eink-worker" script. Local dev should NOT use this block — use `npm run dev`
# (wrangler dev --env local), which points at [env.local]'s dummy ids instead, so
# there's no way to accidentally read/write the real production data locally.
[[d1_databases]]
binding = "DB"
database_name = "eink"
database_id = "1a096c38-f384-4228-a3e4-d767e6efc9a8"
migrations_dir = "src/db/migrations"

# NOTE: dashboard currently has this binding named "KV_BINDING" — rename it to "KV"
# in the Cloudflare dashboard (Workers > eink-worker > Settings > Bindings) to match
# `env.KV` used throughout the code, or env.KV will be undefined at runtime.
[[kv_namespaces]]
binding = "KV"
id = "239dca4bf22e40cd98e0d058b356d145"

# Local development only. Deliberately distinct dummy ids from the real resources
# above — `wrangler dev --env local` (default local/Miniflare mode, no --remote)
# never contacts the Cloudflare API for these, so any id works, but keeping them
# different from prod means a stray --remote flag fails loudly instead of touching
# real data.
[env.local]
[env.local.vars]
ENVIRONMENT = "development"

[[env.local.d1_databases]]
binding = "DB"
database_name = "eink-local"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "src/db/migrations"

[[env.local.kv_namespaces]]
binding = "KV"
id = "eink-kv-local"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1